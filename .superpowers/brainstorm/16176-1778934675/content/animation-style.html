<h2>字幕动画风格偏好</h2>
<p class="subtitle">选择你觉得最合适的字幕动画风格</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>经典逐字出现（Karaoke 风格）</h3>
      <p>文字一次全部显示，但颜色/高亮逐字从左到右扫过，类似 KTV 字幕效果。适合音乐、MV 等节奏感强的内容。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>淡入淡出（Fade In/Out）</h3>
      <p>每条字幕平滑淡入、持续显示、淡出消失。简洁不抢眼，适合演讲、纪录片、教学等严肃内容。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>打字机效果（Typewriter）</h3>
      <p>文字逐字快速打出，配合光标闪烁。适合科技感、解说类内容，带一点节奏感但不张扬。</p>
    </div>
  </div>
  <div class="option" data-choice="d" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>多种风格可选</h3>
      <p>不是固定一种，而是提供多种动画风格让用户在生成时选择。更灵活但实现更复杂。</p>
    </div>
  </div>
</div>
