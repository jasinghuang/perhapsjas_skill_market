<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1242">
<title>Ending Card</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1242px;
    height: 1660px;
    background: #faf3e1;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'FZLanTingHeiS-EL-GB', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 1151px;
    height: 1580px;
    background: #ffffff;
    border-radius: 39px;
    border-bottom: 5px solid #000;
    padding: 70px 45px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* 结尾图标 */
  .ending-icon {
    font-size: 120px;
    margin-bottom: 40px;
    line-height: 1;
  }

  /* 标题 */
  .ending-title {
    font-family: 'FZLanTingHeiS-EB-GB', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-size: 64px;
    font-weight: 800;
    color: #d22727;
    letter-spacing: 7.68px;
    text-align: center;
    margin-bottom: 40px;
    line-height: 1.3;
  }

  /* 总结列表 */
  .summary-list {
    font-family: 'FZLanTingHeiS-M-GB', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-size: 40px;
    font-weight: 500;
    color: #000000;
    letter-spacing: 4px;
    line-height: 1.8;
    text-align: left;
    max-width: 900px;
    width: 100%;
    margin-bottom: 60px;
    list-style: none;
  }

  .summary-list li {
    margin-bottom: 12px;
  }

  /* CTA 按钮 */
  .cta-button {
    width: 450px;
    height: 90px;
    background: #d22727;
    border-radius: 45px;
    color: #ffffff;
    font-family: 'FZLanTingHeiS-B-GB', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 60px;
    border: none;
  }

  /* 风险提示（固定文案，不可修改） */
  .disclaimer {
    position: absolute;
    top: 1405px;
    left: 14px;
    right: 14px;
    font-family: 'FZLanTingHeiS-R-GB', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: #2d2727;
    letter-spacing: 1.4px;
    line-height: 1.18;
    text-align: center;
  }
</style>
</head>
<body>

<div class="card">

  <!-- 结尾图标：使用 emoji 或图标字符表达结尾氛围 -->
  <div class="ending-icon">{{ENDING_ICON}}</div>

  <!-- 结尾标题：总结性标题文字，如"写在最后" -->
  <div class="ending-title">{{ENDING_TITLE}}</div>

  <!-- 总结要点列表：核心观点回顾 -->
  <ul class="summary-list">
    <!-- 第一个要点 -->
    <li>{{SUMMARY_POINT_1}}</li>
    <!-- 第二个要点 -->
    <li>{{SUMMARY_POINT_2}}</li>
    <!-- 第三个要点 -->
    <li>{{SUMMARY_POINT_3}}</li>
  </ul>

  <!-- CTA 行动号召按钮文字：如"关注了解更多" -->
  <div class="cta-button">{{CTA_TEXT}}</div>

  <!-- 风险提示（固定文案，不可修改） -->
  <div class="disclaimer">风险提示：投资有风险，入市需谨慎，风险责任由投资者自行承担，以上内容不构成投资建议或收益保证。本材料仅为投资者教育目的而发布，不构成投资建议，投资者不应以本材料取代其独立判断或仅依据本材料作出决策。因依据本材料进行投资而引发或可能引发的损失，广发证券不承担任何法律责任。</div>

</div>

</body>
</html>
