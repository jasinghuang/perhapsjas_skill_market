<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1242">
<title>小红书封面卡片</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    width: 1242px;
    height: 1660px;
    background: #fff1cc;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: "FZLanTingHeiS-B-GB", "FZLanTingHeiS-DB-GB", "FZLanTingHeiS-H-GB", "FZLanTingHeiS-R-GB", "PingFang SC", "Microsoft YaHei", sans-serif;
  }

  .card {
    position: relative;
    width: 1151px;
    height: 1580px;
    background: #ffffff;
    border-radius: 39px;
    border-bottom: 5px solid #000000;
    overflow: hidden;
  }

  /* 中文副标题 */
  .cover-subtitle-zh {
    position: absolute;
    top: 102px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: "FZLanTingHeiS-B-GB", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 80px;
    font-weight: 700;
    color: #000000;
    letter-spacing: 8px;
  }

  /* 英文副标题 */
  .cover-subtitle-en {
    position: absolute;
    top: 190px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: "FZLanTingHeiS-DB-GB", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 45px;
    font-weight: 600;
    color: #d22727;
    letter-spacing: 4.5px;
  }

  /* 主题词 */
  .hero-title {
    position: absolute;
    top: 378px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: "FZLanTingHeiS-H-GB", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 220px;
    font-weight: 900;
    color: #d22727;
    letter-spacing: 17.6px;
    white-space: nowrap;
  }

  /* 配图区 */
  .cover-image {
    position: absolute;
    top: 611px;
    left: 84px;
    width: 983px;
    height: 770px;
    border-radius: 8px;
    overflow: hidden;
    background: linear-gradient(135deg, #e8d5c0, #c9a96e);
  }

  .cover-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  /* 风险提示（固定文案，不可修改） */
  .disclaimer {
    position: absolute;
    top: 1433px;
    left: 14px;
    right: 14px;
    font-family: "FZLanTingHeiS-R-GB", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 28px;
    font-weight: 400;
    color: #2d2727;
    letter-spacing: 1.4px;
    line-height: 1.18;
  }
</style>
</head>
<body>
<div class="card">

  <!-- 中文副标题（固定文案，不可修改） -->
  <div class="cover-subtitle-zh">每天一个金融小知识</div>

  <!-- 英文副标题（固定文案，不可修改） -->
  <div class="cover-subtitle-en">One financial tip per day</div>

  <!-- 主题词/主标题，如："复利" -->
  <div class="hero-title">{{TOPIC}}</div>

  <!-- 封面配图，src 替换为实际图片 URL -->
  <div class="cover-image">
    <img src="{{COVER_IMAGE}}" alt="封面配图">
  </div>

  <!-- 风险提示（固定文案，不可修改） -->
  <div class="disclaimer">风险提示：投资有风险，入市需谨慎，风险责任由投资者自行承担，以上内容不构成投资建议或收益保证。本材料仅为投资者教育目的而发布，不构成投资建议，投资者不应以本材料取代其独立判断或仅依据本材料作出决策。因依据本材料进行投资而引发或可能引发的损失，广发证券不承担任何法律责任。</div>

</div>
</body>
</html>
