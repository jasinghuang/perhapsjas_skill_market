  - generic [ref=e3]: 03 黑天鹅的三大特征
  - generic [ref=e4]: 黑天鹅事件之所以"黑"，在于它同时具备三个特征：
  - generic [ref=e5]:
    - generic [ref=e6]: "1"
    - generic [ref=e7]:
      - generic [ref=e8]: 意外性
      - generic [ref=e9]: 发生总是出人意料，让人措手不及。它超出我们的认知范围，任何基于过往经验的预测在它面前都会失效。
  - generic [ref=e10]:
    - generic [ref=e11]: "2"
    - generic [ref=e12]:
      - generic [ref=e13]: 重大影响
      - generic [ref=e14]: 对社会产生深远的影响，改变原有的发展轨迹。一次黑天鹅，可能重塑整个行业、经济乃至时代。
  - generic [ref=e15]:
    - generic [ref=e16]: "3"
    - generic [ref=e17]:
      - generic [ref=e18]: 事后合理化
      - generic [ref=e19]: 尽管黑天鹅事件本身不可预测，但人们往往在事后试图找到解释，认为本应可预见——这是人性难以避免的弱点。
  - generic [ref=e20]:
    - generic [ref=e21]: 💡 三者俱全，才是黑天鹅
    - generic [ref=e22]: 意外性（无法预测）+ 重大影响（改变轨迹）+ 事后合理化（人性弱点）。缺一不可。
