        - generic [ref=e14]:
          - paragraph [ref=e15]: 深圳证券信息有限公司（“深证信息”）由深圳证券交易所（“深交所”）全资控股，是国内最早开展（自2002年）指数专业化运营的机构，国际指数行业协会（IIA）成员，联合国负责任投资倡议（PRI）成员，指数业务通过国际证监会组织《金融基准原则》第三方鉴证。
          - paragraph [ref=e16]: 受深交所委托，深证信息负责深证指数体系的研发、运维和管理，建立以“深证成指、创业板指、深证100”为核心的深市指数体系。同时为服务市场多元化投资需求，深证信息致力于打造覆盖境内外主要市场的国证指数体系。
          - paragraph [ref=e17]: 截至目前，公司旗下“深证指数”和“国证指数”发布数量超过1000条，开发ETF等指数化产品超过170只，为投资者提供丰富的业绩基准和投资标的。
