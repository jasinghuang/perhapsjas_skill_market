      - generic [ref=e55]: 关于晨星
    - paragraph [ref=e58]: Morningstar, Inc. 是全球目前最主要的投资研究机构之一，业务遍及北美、欧洲、澳洲及亚洲，为个人投资者和投资顾问、基金管理公司、退休计划发起机构等专业人士提供财经资讯、基金、股票的分析及评级，并致力于发展具实用性、操作简易及功能显著的分析应用软件工具及服务等。晨星资讯（深圳）有限公司是由美国Morningstar，Inc.（纳斯达克上市公司，代码MORN）于2003年2月通过晨星（亚洲）有限公司在深圳投资成立的港资独资企业。Morningstar, Inc. 及其子公司提供有关各种投资产品的数据和研究报告，包括管理投资产品、上市公司、私人资本市场和即时全球市场数据。Morningstar, Inc. 及其子公司亦有提供投资管理及顾问服务，截至2023年3月31日，晨星所管理及给予投资建议的资产约为2490亿美元。晨星在全球33个国家和地区设有全资或控股子公司。
