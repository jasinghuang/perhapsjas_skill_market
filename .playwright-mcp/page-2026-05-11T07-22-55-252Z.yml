      - generic [ref=e217]: About Morningstar China
      - generic [ref=e218]: 关于晨星中国
    - generic [ref=e220]:
      - paragraph [ref=e221]: 晨星（中国）是由美国Morningstar，Inc.（纳斯达克上市公司，代码MORN）于2003年2月通过晨星（亚洲）有限公司在深圳投资成立的港资独资企业。经过二十年的不断发展，在国内市场上，晨星与国内诸多金融机构建立了良好的合作关系，长期为各类内资和外资银行、基金公司、券商及第三方财富管理机构等，提供基础市场数据、深度分析数据、分析工具与软件、基金研究等服务。晨星资讯还多次应证监会邀请，参与证监会及证券业协会相关的行业管理办法与行业自律规定的制定工作。2010年，晨星资讯通过行业协会评估，并经证监会备案，获得了基金评价评级、单一指标排名及基金评奖等从业资格，成为国内首批十家获批此资格的独立第三方评级评价金融机构，也是唯一的外资评级机构。
      - paragraph [ref=e222]: 晨星于2020年收购Sustainalytics剩余60%的股份后，全资持有Sustainalytics。晨星Sustainalytics 是世界领先的独立ESG研究、分析和评级机构，帮助全球投资者制定和实施负责任投资战略。三十多年来，公司始终站在高质量创新解决方案的开拓前沿，以满足全球投资者不断变化的需求。目前，晨星Sustainalytics已与数百家世界领先的资产管理公司和养老基金合作，将 ESG 和公司治理的信息和评估纳入其投资流程。晨星Sustainalytics还与数百家企业及金融中介机构合作，帮助他们在政策、实践和投资项目中考虑可持续发展。为了更好服务中国投资者和企业，晨星Sustainalytics于2016年开展中国业务，2020年开始建立中国团队，并于2021年在上海设立运营实体——晨星信息咨询（上海）有限公司。
